<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofertas Amazon</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin:0; padding:20px; }
  h1 { text-align:center; color:#333; }
  .products { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
  .product { background:#fff; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.15); width:220px; padding:15px; text-align:center; transition:transform 0.2s, box-shadow 0.2s; }
  .product:hover { transform: scale(1.05); box-shadow:0 5px 15px rgba(0,0,0,0.25); }
  .product img { width:100%; border-radius:8px; }
  .title { font-size:16px; margin:10px 0; height:40px; overflow:hidden; }
  .price-original { text-decoration:line-through; color:#888; font-size:14px; }
  .price-promo { color:#e53935; font-weight:bold; font-size:18px; margin-left:5px; }
  .discount { display:inline-block; background:#e53935; color:#fff; padding:2px 6px; border-radius:5px; font-size:12px; margin-left:5px; }
  .btn-buy { display:inline-block; margin-top:10px; padding:8px 12px; background:#ff9900; color:#fff; border-radius:5px; font-weight:bold; text-decoration:none; transition:background 0.2s; }
  .btn-buy:hover { background:#e68a00; }
</style>
</head>
<body>

<h1>Ofertas Amazon</h1>
<div class="products" id="products-container">
  <p>Carregando produtos...</p>
</div>

<script>
async function loadProducts() {
  try {
    const res = await fetch("/.netlify/functions/amazon");
    const items = await res.json();

    const container = document.getElementById("products-container");
    container.innerHTML = "";

    if (!Array.isArray(items) || items.length === 0) {
      container.innerHTML = "<p>Sem produtos disponíveis.</p>";
      return;
    }

    items.forEach(item => {
      const productHTML = `
      <div class="product" id="${item.asin}">
        <img src="${item.image}" alt="${item.title}">
        <div class="title">${item.title}</div>
        <div>
          <span class="price-original">${item.original_price ? item.original_price + " €" : ""}</span>
          <span class="price-promo">${item.promo_price ? item.promo_price + " €" : ""}</span>
          ${item.discount ? `<span class="discount">-${item.discount}%</span>` : ""}
        </div>
        <a class="btn-buy" href="${item.link}" target="_blank">Comprar Agora</a>
      </div>`;
      container.insertAdjacentHTML("beforeend", productHTML);
    });

  } catch (error) {
    console.error("Erro ao carregar produtos:", error);
    document.getElementById("products-container").innerHTML = "<p>Erro ao carregar produtos. Tenta novamente mais tarde.</p>";
  }
}
</script>

</body>
</html>
