<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos Amazon - Promoções</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #333;
  }
  .products {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }
  .product {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    width: 220px;
    padding: 15px;
    text-align: center;
    transition: transform 0.2s;
  }
  .product:hover {
    transform: scale(1.05);
  }
  .product img {
    width: 100%;
    border-radius: 8px;
  }
  .title {
    font-size: 16px;
    margin: 10px 0;
    height: 40px;
    overflow: hidden;
  }
  .price-original {
    text-decoration: line-through;
    color: #888;
    font-size: 14px;
  }
  .price-promo {
    color: #e53935;
    font-weight: bold;
    font-size: 18px;
    margin-left: 5px;
  }
  .discount {
    display: inline-block;
    background: #e53935;
    color: #fff;
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 12px;
    margin-left: 5px;
  }
  a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>
<body>

<h1>Produtos em Promoção</h1>
<div class="products" id="products-container">
  <!-- Produtos vão aparecer aqui via JS -->
</div>

<script>
const ASINS = ["B0GHNL2SRS", "B0CVB937JQ"]; // mesmo que na API

async function loadProducts() {
  try {
    const res = await fetch("https://teu-vercel-deploy.vercel.app/api/products");
    const items = await res.json();

    const container = document.getElementById("products-container");
    container.innerHTML = "";

    items.forEach(item => {
      const productHTML = `
      <a href="${item.link}" target="_blank">
        <div class="product" id="${item.asin}">
          <img src="${item.image}" alt="${item.title}">
          <div class="title">${item.title}</div>
          <div>
            <span class="price-original">${item.original_price ? item.original_price + " €" : ""}</span>
            <span class="price-promo">${item.promo_price ? item.promo_price + " €" : ""}</span>
            ${item.discount ? `<span class="discount">-${item.discount}%</span>` : ""}
          </div>
        </div>
      </a>`;
      container.insertAdjacentHTML("beforeend", productHTML);
    });

  } catch (error) {
    console.error("Erro a carregar produtos:", error);
    document.getElementById("products-container").innerHTML = "<p>Erro ao carregar produtos. Tenta novamente mais tarde.</p>";
  }
}

loadProducts();
</script>

</body>
</html>
